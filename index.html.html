<style>
  :root{
    --pitch:#0E3B2E;
    --pitch-deep:#0A2C22;
    --cream:#F7F3E8;
    --amber:#F2B134;
    --terra:#D9603B;
    --sage:#9FBBA8;
    --line: rgba(247,243,232,0.10);
    --card: rgba(247,243,232,0.04);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--pitch); color:var(--cream); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased;}
  body{padding-bottom:48px;}

  /* subtle pitch line texture */
  body{
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 64px),
      radial-gradient(circle at 50% -10%, rgba(242,177,52,0.08), transparent 55%);
    background-color:var(--pitch);
  }

  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, var(--pitch-deep) 0%, rgba(10,44,34,0.92) 100%);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    padding:14px 16px 10px;
  }
  .eyebrow{
    font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--sage); display:flex; justify-content:space-between; align-items:center;
  }
  .eyebrow .clock{ color:var(--amber); font-weight:500; }
  .eyebrow .right{ display:flex; align-items:center; gap:8px; }
  .mode-toggle{
    display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden;
  }
  .mode-toggle button{
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em;
    background:none; border:none; color:var(--sage); padding:3px 8px; cursor:pointer;
  }
  .mode-toggle button.active{ background:var(--amber); color:var(--pitch-deep); font-weight:700; }
  h1{
    font-family:'Anton',sans-serif; font-weight:400; letter-spacing:.02em;
    font-size:30px; line-height:1.05; margin-top:4px;
    text-transform:uppercase;
  }
  h1 span{color:var(--amber);}

  /* date rail */
  .rail{
    display:flex; gap:8px; overflow-x:auto; padding:14px 16px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    border-bottom:1px solid var(--line);
    position:sticky; top:64px; z-index:25;
    background:var(--pitch);
  }
  .rail::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; font-family:'DM Mono',monospace; font-size:12px;
    border:1px solid var(--line); border-radius:999px; padding:7px 13px;
    color:var(--sage); white-space:nowrap; cursor:pointer; transition:.15s;
  }
  .chip.active{ background:var(--amber); color:var(--pitch-deep); border-color:var(--amber); font-weight:700;}
  .chip.today::after{content:' •'; color:var(--terra);}
  .chip.active.today::after{color:var(--pitch-deep);}

  /* hero next-match */
  .hero{
    margin:16px; padding:18px;
    border:1px solid var(--line); border-radius:18px;
    background:linear-gradient(135deg, rgba(242,177,52,0.10), rgba(247,243,232,0.02));
    position:relative; overflow:hidden;
  }
  .hero::before{
    content:''; position:absolute; inset:0;
    background-image: radial-gradient(circle, transparent 0, transparent 41%, rgba(255,255,255,0.05) 41%, rgba(255,255,255,0.05) 42%, transparent 42%);
    background-size: 130px 130px; background-position:center -40px;
    opacity:.5; pointer-events:none;
  }
  .hero-label{ font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--amber); text-transform:uppercase;}
  .hero-teams{ font-family:'Anton',sans-serif; font-size:24px; letter-spacing:.02em; margin:8px 0 4px; text-transform:uppercase;}
  .hero-meta{ font-size:13px; color:var(--sage); }
  .hero-countdown{
    margin-top:12px; font-family:'DM Mono',monospace; font-size:13px;
    color:var(--cream); display:flex; gap:14px;
  }
  .hero-countdown b{ font-family:'Anton',sans-serif; font-size:20px; display:block; color:var(--amber); font-weight:400;}

  /* day group */
  .day-group{ padding:0 16px; }
  .day-heading{
    font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--sage); padding:18px 0 8px; display:flex; align-items:center; gap:8px;
  }
  .day-heading .dot{ width:6px; height:6px; border-radius:50%; background:var(--terra); display:none;}
  .day-heading.is-today{ color:var(--amber); }
  .day-heading.is-today .dot{ display:inline-block; }

  /* match card */
  .match{
    display:flex; gap:12px; align-items:center;
    padding:13px 0; border-bottom:1px solid var(--line);
  }
  .match:last-child{ border-bottom:none; }
  .time-block{
    flex:0 0 64px; text-align:center; font-family:'DM Mono',monospace;
  }
  .time-block .t{ font-size:18px; font-weight:700; color:var(--cream); line-height:1.1;}
  .time-block .ampm{ font-size:10px; color:var(--sage); letter-spacing:.08em;}
  .time-block .local{ font-size:10px; color:var(--sage); margin-top:3px; }

  .teams{ flex:1; min-width:0; }
  .team-row{ display:flex; align-items:center; gap:8px; font-size:15px; font-weight:500; padding:1px 0; }
  .team-row.win{ color:var(--amber); font-weight:700; }
  .code{
    flex:0 0 30px; height:30px; border-radius:8px; background:rgba(247,243,232,0.06);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.05em; color:var(--sage);
  }
  .team-row.win .code{ border-color:var(--amber); color:var(--amber); }
  .score{ margin-left:auto; font-family:'DM Mono',monospace; font-weight:700; font-size:15px; }

  .meta{ flex:0 0 auto; text-align:right; }
  .group-tag{
    font-family:'DM Mono',monospace; font-size:10px; color:var(--sage);
    border:1px solid var(--line); border-radius:6px; padding:2px 6px; display:inline-block;
  }
  .live-tag{
    font-family:'DM Mono',monospace; font-size:10px; color:var(--pitch-deep);
    background:var(--terra); border-radius:6px; padding:2px 6px; display:inline-block; font-weight:700;
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.55} }
  .venue{ font-size:10px; color:var(--sage); margin-top:4px; max-width:90px; line-height:1.3; }

  footer{
    text-align:center; padding:28px 16px 8px; font-size:11px; color:var(--sage);
    font-family:'DM Mono',monospace; line-height:1.7;
  }
  footer a{ color:var(--amber); text-decoration:none; }

  @media (prefers-reduced-motion: reduce){
    .live-tag{ animation:none; }
  }

  /* ---------- Tablet: match days become cards in a grid ---------- */
  @media (min-width: 640px){
    header{ padding:16px 24px 10px; }
    .eyebrow{ font-size:12px; }
    h1{ font-size:36px; }
    .rail{ padding:12px 24px; justify-content:center; top:78px; }
    .hero{ max-width:900px; margin:20px auto; padding:24px 28px; }
    .hero-teams{ font-size:30px; }
    .hero-meta{ font-size:14px; }
    .hero-countdown{ font-size:14px; gap:24px; }
    .hero-countdown b{ font-size:24px; }

    #list{
      display:grid; grid-template-columns:repeat(auto-fill, minmax(330px,1fr));
      gap:16px; max-width:920px; margin:0 auto; padding:16px 24px;
      align-items:start;
    }
    .day-group{
      padding:16px 18px; border:1px solid var(--line); border-radius:16px;
      background:var(--card);
    }
    .day-heading{ padding:0 0 8px; }

    .match{ padding:11px 0; }
    .venue{ max-width:120px; }

    footer{ max-width:920px; margin:0 auto; padding:8px 24px 28px; }
  }

  /* ---------- Desktop: sidebar nav + content fills the canvas ---------- */
  @media (min-width: 1100px){
    body{ padding-bottom:0; }
    .layout{
      display:grid; grid-template-columns:300px 1fr; gap:40px;
      max-width:1480px; margin:0 auto; padding:32px 40px;
      align-items:start;
    }
    .sidebar{
      position:sticky; top:32px; display:flex; flex-direction:column; gap:18px;
    }
    header{
      position:static; padding:0; border-bottom:none; background:none; backdrop-filter:none;
    }
    h1{ font-size:42px; }
    .eyebrow{ font-size:11px; }

    .rail{
      position:static; top:auto; display:flex; flex-direction:column; align-items:stretch;
      gap:6px; padding:4px; border-bottom:none; background:rgba(247,243,232,0.03);
      border:1px solid var(--line); border-radius:14px;
      max-height:38vh; overflow-y:auto;
    }
    .rail::-webkit-scrollbar{ display:block; width:5px; }
    .rail::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
    .chip{ text-align:left; border-radius:10px; padding:9px 12px; }

    .hero{ margin:0; max-width:none; padding:22px; }
    .hero-teams{ font-size:26px; }

    #list{
      grid-template-columns:repeat(auto-fill, minmax(340px,1fr));
      max-width:none; margin:0; padding:0; gap:20px;
    }
    footer{ max-width:none; margin:24px 0 0; padding:0; text-align:left; }
  }

  @media (min-width: 1480px){
    .layout{ grid-template-columns:340px 1fr; }
    h1{ font-size:48px; }
    .hero-teams{ font-size:30px; }
  }
</style>
</head>

// ---------- Helpers ----------
const TZ = 'Africa/Addis_Ababa';
const fmtDayKey = new Intl.DateTimeFormat('en-CA',{ timeZone:TZ, year:'numeric', month:'2-digit', day:'2-digit' }); // YYYY-MM-DD
const fmtDayLabel = new Intl.DateTimeFormat('en-US',{ timeZone:TZ, weekday:'short', month:'short', day:'numeric' });
const fmtHM = new Intl.DateTimeFormat('en-GB',{ timeZone:TZ, hour:'2-digit', minute:'2-digit', hourCycle:'h23' });
const fmtHMS = new Intl.DateTimeFormat('en-GB',{ timeZone:TZ, hour:'2-digit', minute:'2-digit', second:'2-digit', hourCycle:'h23' });

let timeMode = '12'; // '12' = Ethiopian (Habesha) 12-hour clock, '24' = standard 24-hour EAT

function amharicPeriod(d){
  const h = parseInt(fmtHM.format(d).split(':')[0],10);
  if(h>=0 && h<6) return 'ሌሊት';
  if(h<12) return 'ጧት';
  if(h<18) return 'ከሰዓት';
  return 'ማታ';
}
// Convert a 24h EAT hour to the Ethiopian 12h clock number (e.g. 22:00 -> 4)
function habeshaHour(h24){
  let e = ((h24-6)+12)%12;
  if(e===0) e=12;
  return e;
}
// Display time for a match row, respecting the chosen mode
function displayTime(d){
  const [hh,mm] = fmtHM.format(d).split(':');
  if(timeMode==='24') return `${hh}:${mm}`;
  return `${String(habeshaHour(parseInt(hh,10))).padStart(2,'0')}:${mm}`;
}
// Display the live clock, respecting the chosen mode
function displayClock(d){
  const [hh,mm,ss] = fmtHMS.format(d).split(':');
  if(timeMode==='24') return `${hh}:${mm}:${ss}`;
  return `${String(habeshaHour(parseInt(hh,10))).padStart(2,'0')}:${mm}:${ss}`;
}

function dayKey(d){ return fmtDayKey.format(d); }
function nowKey(){ return dayKey(new Date()); }

// group matches by EAT day
const groups = {};
const order = [];
M.forEach(m=>{
  const d = new Date(m[0]);
  const k = dayKey(d);
  if(!groups[k]){ groups[k]=[]; order.push(k); }
  groups[k].push({d, home:m[1], away:m[2], venue:m[3], city:m[4], label:m[5], sh:m[6], sa:m[7]});
});
order.forEach(k=>groups[k].sort((a,b)=>a.d-b.d));

const TODAY = nowKey();

// ---------- Render date rail ----------
const rail = document.getElementById('rail');
order.forEach(k=>{
  const d = groups[k][0].d;
  const chip = document.createElement('div');
  chip.className = 'chip' + (k===TODAY ? ' today':'');
  chip.dataset.key = k;
  chip.textContent = fmtDayLabel.format(d);
  chip.onclick = ()=>{
    document.getElementById('day-'+k).scrollIntoView({behavior:'smooth', block:'start'});
  };
  rail.appendChild(chip);
});

// ---------- Render match list ----------
const list = document.getElementById('list');
order.forEach(k=>{
  const section = document.createElement('div');
  section.className='day-group';
  section.id = 'day-'+k;

  const heading = document.createElement('div');
  heading.className = 'day-heading' + (k===TODAY ? ' is-today':'');
  const sample = groups[k][0].d;
  heading.innerHTML = `<span class="dot"></span>${fmtDayLabel.format(sample)}`;
  section.appendChild(heading);

  groups[k].forEach(m=>{
    const now = new Date();
    const end = new Date(m.d.getTime() + 2.5*3600*1000);
    const isLive = now >= m.d && now < end;
    const isPast = now >= end;
    const played = m.sh !== null;

    const row = document.createElement('div');
    row.className = 'match';

    const homeWin = played && m.sh > m.sa;
    const awayWin = played && m.sa > m.sh;

    row.innerHTML = `
      <div class="time-block">
        <div class="t" data-ts="${m.d.getTime()}">${displayTime(m.d)}</div>
        <div class="ampm">${amharicPeriod(m.d)}</div>
      </div>
      <div class="teams">
        <div class="team-row ${homeWin?'win':''}"><span class="code">${code(m.home)}</span><span>${m.home}</span>${played?`<span class="score">${m.sh}</span>`:''}</div>
        <div class="team-row ${awayWin?'win':''}"><span class="code">${code(m.away)}</span><span>${m.away}</span>${played?`<span class="score">${m.sa}</span>`:''}</div>
      </div>
      <div class="meta">
        ${isLive?'<div class="live-tag">LIVE</div>':`<div class="group-tag">${m.label}</div>`}
        <div class="venue">${m.city}</div>
      </div>
    `;
    if(isPast && played) row.style.opacity='0.7';
    section.appendChild(row);
  });

  list.appendChild(section);
});

// ---------- Hero: next/live match ----------
function renderHero(){
  const now = new Date();
  let target = null, live=false;
  for(const k of order){
    for(const m of groups[k]){
      const end = new Date(m.d.getTime() + 2.5*3600*1000);
      if(now < end){ target = m; live = now>=m.d; break; }
    }
    if(target) break;
  }
  const hero = document.getElementById('hero');
  if(!target){
    hero.innerHTML = `<div class="hero-label">Tournament complete</div><div class="hero-teams">See you in 2030</div>`;
    return;
  }
  const diff = target.d - now;
  let cd = '';
  if(live){
    cd = `<div class="hero-countdown"><div><b>● LIVE</b>kickoff under way</div></div>`;
  } else {
    const h = Math.floor(diff/3600000), mnt = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
    cd = `<div class="hero-countdown">
      <div><b>${h}</b>hrs</div><div><b>${mnt}</b>min</div><div><b>${s}</b>sec</div>
    </div>`;
  }
  hero.innerHTML = `
    <div class="hero-label">${live?'Now playing':'Up next'} · ${target.label}</div>
    <div class="hero-teams">${target.home} vs ${target.away}</div>
    <div class="hero-meta">${fmtDayLabel.format(target.d)} · ${displayTime(target.d)} ${amharicPeriod(target.d)} · ${target.city}</div>
    ${cd}
  `;
}
renderHero();
setInterval(renderHero, 1000);

// ---------- Live clock ----------
function renderClock(){
  document.getElementById('clock').textContent = displayClock(new Date());
}
renderClock();
setInterval(renderClock, 1000);

// ---------- 12H / 24H toggle ----------
function refreshMatchTimes(){
  document.querySelectorAll('.time-block .t').forEach(el=>{
    el.textContent = displayTime(new Date(parseInt(el.dataset.ts,10)));
  });
}
document.getElementById('modeToggle').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn || btn.classList.contains('active')) return;
  timeMode = btn.dataset.mode;
  document.querySelectorAll('#modeToggle button').forEach(b=>b.classList.toggle('active', b===btn));
  refreshMatchTimes();
  renderClock();
  renderHero();
});

// ---------- Scroll to today on load ----------
window.addEventListener('load', ()=>{
  const el = document.getElementById('day-'+TODAY);
  if(el) el.scrollIntoView({behavior:'auto', block:'start'});
  else if(order.length) document.getElementById('day-'+order[0]).scrollIntoView({behavior:'auto', block:'start'});
});
</script>
